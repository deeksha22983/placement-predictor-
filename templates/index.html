<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Placement Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🎓 Student Placement Predictor</h1>
        <form action="/predict" method="POST">
            <label for="cgpa">Cumulative GPA (CGPA)</label>
            <input type="number" step="any" id="cgpa" name="cgpa" placeholder="e.g. 8.5" required>

            <label for="placement_exam_marks">Placement Exam Marks</label>
            <input type="number" step="any" id="placement_exam_marks" name="placement_exam_marks" placeholder="e.g. 45.5" required>

            <button type="submit" class="btn">Predict Placement Status</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
